services:
  scene_graph:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: scene_graph:latest
    container_name: scene_graph

    # ── GPU ─────────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

    # ── Environment ─────────────────────────────────────────────
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_localhost.xml

    # ── Volumes ─────────────────────────────────────────────────
    volumes:
      - ../ros2_ws:/ros2_ws
      - ../viz:/viz
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - ../fastdds_localhost.xml:/fastdds_localhost.xml:ro
      - scene_graph_data:/data

    # ── Networking ──────────────────────────────────────────────
    network_mode: host                       # ROS2 DDS needs host network

    # ── Privileges ──────────────────────────────────────────────
    privileged: true
    ipc: host
    devices:
      - /dev/bus/usb/004/042:/dev/bus/usb/004/042
    # ── Ports ───────────────────────────────────────────────────
    # ports:
    #   - "8080:8080"    # Web visualizer
    #   - "8765:8765"    # WebSocket
    # (disabled - using host network)

    stdin_open: true
    tty: true

    # ── Default command ─────────────────────────────────────────
    command: >
      bash -c "
        /opt/venv/bin/pip install -q 'numpy<2' 'opencv-python<4.10' &&
        source /opt/ros/jazzy/setup.bash &&
        cd /ros2_ws &&
        colcon build --symlink-install --packages-select scene_graph_pkg &&
        source install/setup.bash &&
        export PYTHONPATH=/opt/venv/lib/python3.12/site-packages:$$PYTHONPATH &&
        ros2 launch scene_graph_pkg scene_graph_nodriver.launch.py ws_port:=8766
      "

volumes:
  scene_graph_data:
